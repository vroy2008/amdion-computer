<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Locked in — Amdion</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: radial-gradient(120% 120% at 50% 0%, #15171a 0%, #0a0a0a 60%);
      color: #f5f5f5; display: flex; align-items: center; justify-content: center;
      min-height: 100vh; text-align: center; padding: 24px;
    }
    .wrap { max-width: 440px; }
    .mark { font-size: 12px; letter-spacing: 0.34em; color: #2480ba; font-weight: 600; margin-bottom: 28px; }
    h1 { font-size: 30px; font-weight: 300; margin-bottom: 16px; }
    p { font-size: 15px; line-height: 1.6; color: #c9c9c9; }
    .domain { color: #f5f5f5; font-weight: 500; }
    .sub { font-size: 13px; color: #6b7280; margin-top: 22px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="mark">AMDION</div>
    <h1>Locked in.</h1>
    <p>You set <span class="domain" id="domain">this site</span> aside while you focus.</p>
    <p class="sub">Change this any time in Amdion → Settings → Friction.</p>
  </div>
  <script>
    const d = new URLSearchParams(location.search).get('d');
    if (d) document.getElementById('domain').textContent = d;
  </script>
</body>
</html>
